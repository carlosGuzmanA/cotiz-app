<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Cotizaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Lato:wght@300;400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="quotes.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="quotes-page">
  <main class="quotes-shell">
    <div class="quotes-topbar">
      <button id="btnBackApp" class="quotes-nav-back" type="button" title="Volver a la app">
        <i class="fas fa-arrow-left"></i>
      </button>
      <div class="quotes-topbar-center">
        <h1 class="quotes-title">Historial</h1>
        <p class="quotes-sub">Cotizaciones guardadas</p>
      </div>
      <button id="btnLogout" class="quotes-nav-logout" type="button" title="Cerrar sesión">
        <i class="fas fa-right-from-bracket"></i>
      </button>
    </div>

    <p id="sessionInfo" class="quotes-sub">Sin sesión</p>

    <section id="authCard" class="auth-card">
      <h2>Iniciar sesión</h2>
      <p class="quotes-sub">Usa usuario y contraseña de Firebase Authentication.</p>
      <form id="loginForm" class="form-stack">
        <input id="loginEmail" class="quotes-input" type="email" placeholder="usuario@empresa.cl" required>
        <input id="loginPassword" class="quotes-input" type="password" placeholder="Contraseña" required>
        <button class="quotes-btn" type="submit">Entrar</button>
      </form>
    </section>

    <section id="quotesListCard" class="list-card hidden">
      <h2>Cotizaciones guardadas</h2>
      <p class="quotes-sub">Abre una cotización para editarla antes de volver a generar PDF.</p>
      <div id="quoteList" class="quote-list"></div>
    </section>

    <p id="quotesStatus" class="status-line"></p>
  </main>

  <!-- MODAL: DETALLE COTIZACIÓN -->
  <div class="detail-overlay" id="detailModal"></div>

  <!-- MODAL: PROGRAMAR FECHA -->
  <div class="schedule-overlay" id="scheduleModal">
    <div class="schedule-sheet">
      <div class="schedule-handle"></div>
      <div class="schedule-title" id="scheduleModalTitle">Programar fecha</div>
      <p class="schedule-hint" id="scheduleModalHint"></p>
      <div class="schedule-fields">
        <div class="schedule-field-group">
          <label class="schedule-label"><i class="fas fa-calendar"></i> Fecha</label>
          <input type="date" id="scheduleModalDatePart" class="schedule-input">
        </div>
        <div class="schedule-field-group" id="scheduleTimeGroup">
          <label class="schedule-label"><i class="fas fa-clock"></i> Hora</label>
          <input type="time" id="scheduleModalTimePart" class="schedule-input" value="09:00">
        </div>
      </div>
      <div class="schedule-actions">
        <button class="quotes-btn schedule-confirm-btn" id="btnScheduleConfirm"><i class="fas fa-calendar-check"></i> Confirmar</button>
        <button class="quotes-btn secondary" id="btnScheduleCancel">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="firebase-auth.js"></script>
  <script src="quotes-repo.js"></script>
  <script src="quotes.js"></script>
</body>
</html>
