<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Clientes · CotizaClima</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Lato:wght@300;400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="quotes.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="quotes-page">
  <main class="quotes-shell">

    <div class="quotes-topbar">
      <button id="btnBackApp" class="quotes-nav-back" type="button" title="Volver a la app">
        <i class="fas fa-arrow-left"></i>
      </button>
      <div class="quotes-topbar-center">
        <h1 class="quotes-title">Clientes</h1>
        <p class="quotes-sub">Directorio de clientes</p>
      </div>
      <button id="btnLogout" class="quotes-nav-logout" type="button" title="Cerrar sesión">
          <i class="fas fa-right-from-bracket"></i>
        </button>
    </div>

    <!-- TABS DE SECCIÓN -->
    <div class="section-tabs" role="tablist">
      <button class="section-tab" type="button" role="tab" aria-selected="false" onclick="window.location.href='quotes.html'">
        <i class="fas fa-clock-rotate-left"></i> Historial
      </button>
      <button class="section-tab active" type="button" role="tab" aria-selected="true" aria-current="page">
        <i class="fas fa-users"></i> Clientes
      </button>
      <button class="section-tab" type="button" role="tab" aria-selected="false" onclick="window.location.href='catalog.html'">
        <i class="fas fa-box-open"></i> Catálogo
      </button>
    </div>

    <p id="sessionInfo" class="quotes-sub" style="margin-bottom:12px;">Sin sesión</p>

    <div class="clients-search-bar">
      <input id="clientsSearchInput" class="quotes-input clients-search-input" type="search"
        placeholder="Buscar por nombre o RUT..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>

    <section id="clientsListCard" class="list-card" style="display:none; margin-top:16px;">
      <div id="clientList" class="client-list"></div>
    </section>

    <p id="clientsStatus" class="status-line"></p>

  </main>

  <script src="firebase-auth.js"></script>
  <script src="quotes-repo.js"></script>
  <script src="client-repo.js"></script>
  <script>
  (function() {
    var PENDING_QUOTE_STORAGE_KEY = 'cotiz_pending_quote_v1';

    function $(id) { return document.getElementById(id); }

    function fmtNum(n) {
      return Math.round(Number(n || 0)).toLocaleString('es-CL');
    }

    function showStatus(message, isError) {
      var el = $('clientsStatus');
      if (!el) return;
      el.textContent = message || '';
      el.style.color = isError ? '#8b2e0f' : '#6a655e';
    }

    function navigateToEditorWithQuote(quote) {
      sessionStorage.setItem(PENDING_QUOTE_STORAGE_KEY, JSON.stringify({ quote: quote }));
      window.location.href = 'index.html';
    }

    function buildWazeUrl(obj) {
      var parts = [obj.address, obj.city, obj.region].filter(Boolean);
      if (!parts.length) return '';
      return 'https://waze.com/ul?q=' + encodeURIComponent(parts.join(', ')) + '&navigate=yes';
    }

    // Evalúa el estado de alerta de garantía para un listado de cotizaciones.
    // Retorna: 'expired' | 'soon' | 'active' | null
    function warrantyAlert(quotes) {
      var now = Date.now();
      var SOON_MS = 15 * 24 * 60 * 60 * 1000; // 15 días
      var result = null;
      var priority = { expired: 3, soon: 2, active: 1 };
      quotes.forEach(function(q) {
        if (q.status !== 'warranty' || !q.warrantyDate) return;
        var exp = Number(q.warrantyDate);
        var level = exp < now ? 'expired' : (exp - now <= SOON_MS ? 'soon' : 'active');
        if (!result || (priority[level] > priority[result])) result = level;
      });
      return result;
    }

    var STATUS_CONFIG = {
      draft:     { label: 'Borrador',   icon: 'fa-file-pen',       cls: 'status-draft'      },
      issued:    { label: 'Emitida',    icon: 'fa-paper-plane',    cls: 'status-issued'     },
      accepted:  { label: 'Aceptada',   icon: 'fa-circle-check',   cls: 'status-accepted'   },
      scheduled: { label: 'Programada', icon: 'fa-calendar-check', cls: 'status-scheduled'  },
      completed: { label: 'Finalizada', icon: 'fa-flag-checkered', cls: 'status-completed'  },
      warranty:  { label: 'Garantía',   icon: 'fa-shield-halved',  cls: 'status-warranty'   }
    };

    var TRANSITIONS = {
      draft:     ['issued'],
      issued:    ['accepted'],
      accepted:  ['scheduled'],
      scheduled: ['completed'],
      completed: ['warranty'],
      warranty:  []
    };

    var TRANSITION_LABEL = {
      issued:    'Marcar emitida',
      accepted:  'Cliente aceptó',
      scheduled: 'Programar fecha',
      completed: 'Marcar finalizada',
      warranty:  'Programar garantía'
    };

    function statusBadge(status) {
      var cfg = STATUS_CONFIG[status] || STATUS_CONFIG.draft;
      return '<span class="status-badge ' + cfg.cls + '"><i class="fas ' + cfg.icon + '"></i> ' + cfg.label + '</span>';
    }

    function scheduledDateLine(item) {
      var lines = [];
      if (item.scheduledDate) {
        var d1 = new Date(item.scheduledDate);
        lines.push('<div class="quote-scheduled-line"><i class="fas fa-calendar-day"></i> Instalación: <strong>' + d1.toLocaleString('es-CL', {dateStyle:'medium', timeStyle:'short'}) + '</strong></div>');
      }
      if (item.completedAt) {
        var d2 = new Date(item.completedAt);
        lines.push('<div class="quote-scheduled-line"><i class="fas fa-flag-checkered"></i> Finalizada: <strong>' + d2.toLocaleDateString('es-CL', {dateStyle:'medium'}) + '</strong></div>');
      }
      if (item.warrantyDate) {
        var d3 = new Date(item.warrantyDate);
        var isPast = d3 < new Date();
        lines.push('<div class="quote-scheduled-line' + (isPast ? ' expired' : '') + '"><i class="fas fa-shield-halved"></i> Garantía hasta: <strong>' + d3.toLocaleDateString('es-CL', {dateStyle:'medium'}) + '</strong>' + (isPast ? ' — Vencida' : '') + '</div>');
      }
      return lines.join('');
    }

    function nextTransitionButton(item) {
      var status = item.status || 'draft';
      var nexts = TRANSITIONS[status] || [];
      if (!nexts.length) return '';
      var next = nexts[0];
      var needsDate = (next === 'scheduled' || next === 'warranty');
      var dataDate = needsDate ? 'data-needs-date="1"' : '';
      var dataCompleted = item.completedAt ? 'data-completed-at="' + item.completedAt + '"' : '';
      return '<button class="quotes-btn action-btn" data-action="advance" data-id="' + item.id + '" data-next="' + next + '" ' + dataDate + ' ' + dataCompleted + ' title="' + TRANSITION_LABEL[next] + '">' +
        '<i class="fas ' + STATUS_CONFIG[next].icon + '"></i> ' + TRANSITION_LABEL[next] +
        '</button>';
    }

    function renderQuoteRow(q) {
      var status = q.status || 'draft';
      var client = q.client || {};
      var total = (q.pricing && q.pricing.total) ? ('$' + fmtNum(q.pricing.total)) : '$0';
      var updated = q.updatedAt ? new Date(q.updatedAt).toLocaleString('es-CL') : 'Sin fecha';
      var phone = client.phone ? client.phone.trim() : '';
      var wazeUrl = buildWazeUrl(client);
      var callBtn = phone
        ? '<a class="quotes-btn secondary icon-btn" href="tel:' + phone.replace(/\s/g, '') + '" title="Llamar"><i class="fas fa-phone"></i></a>'
        : '';
      var wazeBtn = wazeUrl
        ? '<a class="quotes-btn secondary icon-btn" href="' + wazeUrl + '" target="_blank" rel="noopener noreferrer" title="Waze"><i class="fas fa-route"></i></a>'
        : '';
      var advanceBtn = nextTransitionButton(q);
      var isLocked = ['accepted','scheduled','completed','warranty'].indexOf(status) !== -1;
      var editBtn = isLocked
        ? '<button class="quotes-btn icon-btn" disabled title="Cotización bloqueada: edita los datos del cliente en esta sección"><i class="fas fa-pen-to-square"></i></button>'
        : '<button class="quotes-btn icon-btn" data-action="open" data-id="' + q.id + '" title="Abrir y editar"><i class="fas fa-pen-to-square"></i></button>';

      // Botón reprogramar (instalación o garantía)
      var rescheduleBtn = '';
      if (status === 'scheduled') {
        rescheduleBtn = '<button class="quotes-btn secondary action-btn" data-action="reschedule-install" data-id="' + q.id + '" data-scheduled-date="' + (q.scheduledDate || '') + '" title="Reprogramar fecha de instalación"><i class="fas fa-calendar-pen"></i> Reprogramar instalación</button>';
      } else if (status === 'warranty') {
        var wdLabel = q.warrantyDate ? new Date(q.warrantyDate).toLocaleDateString('es-CL', {dateStyle:'short'}) : 'Sin fecha';
        rescheduleBtn = '<button class="quotes-btn secondary action-btn" data-action="reschedule-warranty" data-id="' + q.id + '" data-warranty-date="' + (q.warrantyDate || '') + '" title="Reprogramar visita de garantía"><i class="fas fa-calendar-pen"></i> Reprogramar garantía: ' + wdLabel + '</button>';
      }

      return '<div class="quote-item status-border-' + status + '" data-id="' + q.id + '">' +
        '<div class="quote-head">' +
          '<div class="quote-head-left">' +
            '<div class="quote-num">' + (q.quoteNumber || q.id) + '</div>' +
            '<div class="quote-meta">Actualizada: ' + updated + '</div>' +
          '</div>' +
          '<div class="quote-head-right">' +
            statusBadge(status) +
            '<div class="quote-total">' + total + '</div>' +
          '</div>' +
        '</div>' +
        scheduledDateLine(q) +
        (advanceBtn    ? '<div class="quote-advance-row">' + advanceBtn    + '</div>' : '') +
        (rescheduleBtn ? '<div class="quote-advance-row">' + rescheduleBtn + '</div>' : '') +
        '<div class="quote-actions-row">' +
          '<div class="quote-actions-group">' +
            editBtn +
            '<button class="quotes-btn secondary icon-btn" data-action="detail"    data-id="' + q.id + '" title="Ver detalle"><i class="fas fa-eye"></i></button>' +
            '<button class="quotes-btn secondary icon-btn" data-action="duplicate" data-id="' + q.id + '" title="Duplicar"><i class="fas fa-copy"></i></button>' +
            callBtn + wazeBtn +
          '</div>' +
          '<button class="quotes-btn danger icon-btn" data-action="delete" data-id="' + q.id + '" title="Eliminar"><i class="fas fa-trash"></i></button>' +
        '</div>' +
      '</div>';
    }

    function openDetailModal(item) {
      var client  = item.client  || {};
      var pricing = item.pricing || {};
      var status  = item.status  || 'draft';
      var statusLabels = { draft:'Borrador', issued:'Emitida', accepted:'Aceptada', scheduled:'Programada', completed:'Finalizada', warranty:'Garantía' };
      var statusIcons  = { draft:'fa-file-pen', issued:'fa-paper-plane', accepted:'fa-circle-check', scheduled:'fa-calendar-check', completed:'fa-flag-checkered', warranty:'fa-shield-halved' };
      var statusCls    = { draft:'status-draft', issued:'status-issued', accepted:'status-accepted', scheduled:'status-scheduled', completed:'status-completed', warranty:'status-warranty' };
      var cfg = { label: statusLabels[status] || status, icon: statusIcons[status] || 'fa-file', cls: statusCls[status] || 'status-draft' };

      var fmtDate = function(ts) { return ts ? new Date(ts).toLocaleString('es-CL', { dateStyle:'medium', timeStyle:'short' }) : '—'; };
      var fmtDateOnly = function(ts) { return ts ? new Date(ts).toLocaleDateString('es-CL', { dateStyle:'medium' }) : '—'; };

      var equipRows = (item.equipmentSelections || []).map(function(eq) {
        return '<div class="detail-row"><span>' + (eq.marca ? eq.marca + ' ' : '') + (eq.brandModel || '') + ' ' + (eq.btu ? (eq.btu/1000).toFixed(0)+'K' : '') + ' x' + (eq.qty || 1) + '</span><span>$' + fmtNum((eq.unitPrice || 0) * (eq.qty || 1)) + '</span></div>';
      }).join('');

      var svcItems = [];
      var svc = item.serviceSelection || {};
      if (svc.serviceQtyMap) {
        if (svc.serviceQtyMap.instalacion > 0) svcItems.push('Instalación x' + svc.serviceQtyMap.instalacion + ' — $' + fmtNum((svc.instalacionUnitValue || 0) * svc.serviceQtyMap.instalacion));
        if (svc.serviceQtyMap.mantencion  > 0) svcItems.push('Mantención x'  + svc.serviceQtyMap.mantencion  + ' — $' + fmtNum((svc.mantencionUnitValue  || 0) * svc.serviceQtyMap.mantencion));
      }
      var svcRows = svcItems.map(function(s) { return '<div class="detail-row"><span>' + s + '</span></div>'; }).join('');

      var wazeUrl = buildWazeUrl(client);
      var wazeLink = wazeUrl ? '<a href="' + wazeUrl + '" target="_blank" rel="noopener noreferrer" class="detail-link"><i class="fas fa-route"></i> Abrir en Waze</a>' : '';

      var modal = $('clientDetailModal');
      modal.innerHTML =
        '<div class="detail-sheet">' +
          '<div class="detail-handle"></div>' +
          '<div class="detail-header">' +
            '<div>' +
              '<div class="detail-quote-num">' + (item.quoteNumber || item.id) + '</div>' +
              '<div class="detail-date">Actualizada: ' + fmtDate(item.updatedAt) + '</div>' +
            '</div>' +
            '<span class="status-badge ' + cfg.cls + '"><i class="fas ' + cfg.icon + '"></i> ' + cfg.label + '</span>' +
          '</div>' +
          '<div class="detail-total-banner">$' + fmtNum(pricing.total) + '</div>' +
          '<div class="detail-section">' +
            '<div class="detail-section-title"><i class="fas fa-user"></i> Cliente</div>' +
            '<div class="detail-kv"><b>Nombre</b><span>' + (client.name || '—') + '</span></div>' +
            (client.rut   ? '<div class="detail-kv"><b>RUT</b><span>' + client.rut + '</span></div>' : '') +
            (client.phone ? '<div class="detail-kv"><b>Teléfono</b><span><a href="tel:' + client.phone.replace(/\s/g,'') + '" class="detail-link">' + client.phone + '</a></span></div>' : '') +
            (client.email ? '<div class="detail-kv"><b>Correo</b><span>' + client.email + '</span></div>' : '') +
            (client.address ? '<div class="detail-kv"><b>Dirección</b><span>' + [client.address, client.city, client.region].filter(Boolean).join(', ') + ' ' + wazeLink + '</span></div>' : '') +
          '</div>' +
          (equipRows ? '<div class="detail-section"><div class="detail-section-title"><i class="fas fa-snowflake"></i> Equipos</div>' + equipRows + '</div>' : '') +
          (svcRows   ? '<div class="detail-section"><div class="detail-section-title"><i class="fas fa-screwdriver-wrench"></i> Servicios</div>' + svcRows + '</div>' : '') +
          '<div class="detail-section">' +
            '<div class="detail-section-title"><i class="fas fa-calculator"></i> Totales</div>' +
            (pricing.equipment   ? '<div class="detail-row"><span>Equipos</span><span>$' + fmtNum(pricing.equipment) + '</span></div>' : '') +
            (pricing.services    ? '<div class="detail-row"><span>Servicios</span><span>$' + fmtNum(pricing.services) + '</span></div>' : '') +
            (pricing.accessories ? '<div class="detail-row"><span>Accesorios</span><span>$' + fmtNum(pricing.accessories) + '</span></div>' : '') +
            (pricing.discountPct ? '<div class="detail-row discount"><span>Descuento (' + pricing.discountPct + '%)</span><span>−$' + fmtNum(pricing.discountAmount) + '</span></div>' : '') +
            '<div class="detail-row total-row"><span>Total</span><span>$' + fmtNum(pricing.total) + '</span></div>' +
          '</div>' +
          (item.scheduledDate || item.completedAt || item.warrantyDate ?
            '<div class="detail-section">' +
              '<div class="detail-section-title"><i class="fas fa-calendar"></i> Fechas</div>' +
              (item.scheduledDate ? '<div class="detail-kv"><b>Instalación</b><span>' + fmtDate(item.scheduledDate) + '</span></div>' : '') +
              (item.completedAt  ? '<div class="detail-kv"><b>Finalizada</b><span>' + fmtDateOnly(item.completedAt) + '</span></div>' : '') +
              (item.warrantyDate ? '<div class="detail-kv"><b>Garantía</b><span>' + fmtDateOnly(item.warrantyDate) + '</span></div>' : '') +
            '</div>' : '') +
          '<div class="detail-actions">' +
            '<button class="quotes-btn" id="btnClientDetailOpen"><i class="fas fa-pen-to-square"></i> Abrir y editar</button>' +
            '<button class="quotes-btn secondary" id="btnClientDetailClose">Cerrar</button>' +
          '</div>' +
        '</div>';

      modal.classList.add('open');
      $('btnClientDetailClose').onclick = closeDetailModal;
      $('btnClientDetailOpen').onclick = function() { closeDetailModal(); navigateToEditorWithQuote(item); };
      modal.onclick = function(e) { if (e.target === modal) closeDetailModal(); };
    }

    function closeDetailModal() {
      $('clientDetailModal').classList.remove('open');
    }

    // ── Funciones de numeración de cotizaciones ───────────────
    function getQuoteYearFromNumber(quoteNumber) {
      var normalized = String(quoteNumber || '').trim().toUpperCase();
      var m = normalized.match(/^CL-(\d{4})-(\d{4,})$/);
      if (m) return m[1];
      var l = normalized.match(/^COT-(\d{8})-(\d{4,})$/);
      if (l) return l[1].slice(0, 4);
      return String(new Date().getFullYear());
    }

    function parseQuoteSequenceByYear(quoteNumber, year) {
      var n = String(quoteNumber || '').trim().toUpperCase();
      var m = n.match(/^CL-(\d{4})-(\d{4,})$/);
      if (m) return String(year) !== m[1] ? 0 : Number(m[2]) || 0;
      var l = n.match(/^COT-(\d{8})-(\d{4,})$/);
      if (l) return String(year) !== l[1].slice(0,4) ? 0 : Number(l[2]) || 0;
      return 0;
    }

    function buildQuoteNumber(year, sequence) {
      return 'CL-' + year + '-' + String(Math.max(1, Number(sequence) || 1)).padStart(4, '0');
    }

    // ── Recarga datos de cotizaciones desde Firebase ──────────
    async function reloadQuotesData() {
      var user = window.FirebaseAuthService.getCurrentUser();
      var idToken = await window.FirebaseAuthService.getValidIdToken();
      var quotes = await window.QuotesRepo.listQuotes(user.uid, idToken);
      quoteById = {};
      quotes.forEach(function(q) { quoteById[q.id] = q; });
      rebuildQuotesByClient();
      renderFiltered($('clientsSearchInput').value);
    }

    // ── Avance de estado ──────────────────────────────────────
    var _pendingAdvance = null;

    function openScheduleModal(id, nextStatus, completedAt, prefillTs) {
      _pendingAdvance = { id: id, nextStatus: nextStatus };
      var modal = $('clientsScheduleModal');
      var title = $('clientsScheduleTitle');
      var hint  = $('clientsScheduleHint');
      var datePart = $('clientsScheduleDatePart');
      var timePart = $('clientsScheduleTimePart');
      var today = new Date().toISOString().slice(0, 10);
      datePart.min = today;
      datePart.max = '';
      if (nextStatus === 'scheduled') {
        title.textContent = prefillTs ? 'Reprogramar instalación' : 'Programar instalación';
        hint.textContent  = prefillTs ? 'Selecciona la nueva fecha y hora de instalación.' : 'Selecciona la fecha y hora de la visita de instalación.';
        if (prefillTs) {
          var d = new Date(prefillTs);
          datePart.value = d.toISOString().slice(0, 10);
          timePart.value = d.toTimeString().slice(0, 5);
        } else {
          datePart.value = '';
          timePart.value = '09:00';
        }
      } else if (nextStatus === 'warranty') {
        if (prefillTs) {
          title.textContent = 'Reprogramar visita de garantía';
          hint.textContent  = 'Selecciona la nueva fecha y hora de la visita.';
          var dw = new Date(prefillTs);
          datePart.value = dw.toISOString().slice(0, 10);
          timePart.value = dw.toTimeString().slice(0, 5);
        } else {
          title.textContent = 'Visita de garantía';
          hint.textContent  = 'Agenda la visita de garantía (sin costo). Fecha sugerida: 6 meses desde la finalización.';
          var base = completedAt ? new Date(completedAt) : new Date();
          var suggested = new Date(base);
          suggested.setMonth(suggested.getMonth() + 6);
          datePart.value = suggested.toISOString().slice(0, 10);
          datePart.max   = suggested.toISOString().slice(0, 10);
          timePart.value = '09:00';
        }
      } else {
        datePart.value = '';
        timePart.value = '09:00';
      }
      modal.classList.add('open');
    }

    function closeScheduleModal() {
      _pendingAdvance = null;
      $('clientsScheduleModal').classList.remove('open');
      $('clientsScheduleDatePart').value = '';
      $('clientsScheduleTimePart').value = '09:00';
      if ($('clientsScheduleDatePart').max) $('clientsScheduleDatePart').max = '';
    }

    async function confirmSchedule() {
      if (!_pendingAdvance) return;
      var id = _pendingAdvance.id;
      var nextStatus = _pendingAdvance.nextStatus;
      var dateVal = $('clientsScheduleDatePart').value;
      var timeVal = $('clientsScheduleTimePart').value || '09:00';
      if (!dateVal) { alert('Por favor selecciona una fecha.'); return; }
      var ts = new Date(dateVal + 'T' + timeVal).getTime();
      if (isNaN(ts)) { alert('Fecha inválida.'); return; }
      closeScheduleModal();
      await advanceStatus(id, nextStatus, ts);
    }

    async function advanceStatus(id, nextStatus, scheduledTs) {
      try {
        var user = window.FirebaseAuthService.getCurrentUser();
        var idToken = await window.FirebaseAuthService.getValidIdToken();
        var extra = {};
        if (nextStatus === 'scheduled') {
          extra.scheduledDate = scheduledTs || null;
        } else if (nextStatus === 'completed') {
          extra.completedAt = Date.now();
          var warrantyEnd = new Date();
          warrantyEnd.setMonth(warrantyEnd.getMonth() + 6);
          extra.warrantyExpiry = warrantyEnd.getTime();
        } else if (nextStatus === 'warranty') {
          extra.warrantyDate = scheduledTs || null;
        }
        await window.QuotesRepo.updateQuoteStatus(user.uid, idToken, id, nextStatus, extra);
        showStatus('Estado actualizado: ' + STATUS_CONFIG[nextStatus].label, false);
        await reloadQuotesData();
      } catch (e) {
        showStatus(e.message || 'Error al actualizar estado.', true);
      }
    }

    async function duplicateQuote(id) {
      try {
        var user = window.FirebaseAuthService.getCurrentUser();
        var idToken = await window.FirebaseAuthService.getValidIdToken();
        var quote = quoteById[id];
        if (!quote) throw new Error('No se encontró la cotización.');
        var targetYear = getQuoteYearFromNumber(quote.quoteNumber);
        var allQuotes = Object.values(quoteById);
        var maxSeq = allQuotes.reduce(function(max, item) {
          var seq = parseQuoteSequenceByYear(item && item.quoteNumber, targetYear);
          return seq > max ? seq : max;
        }, 0);
        var clone = Object.assign({}, quote, {
          id: undefined, activeQuoteId: null, status: 'draft',
          quoteNumber: buildQuoteNumber(targetYear, maxSeq + 1),
          createdAt: Date.now(), updatedAt: Date.now(),
          scheduledDate: null, completedAt: null, warrantyDate: null
        });
        await window.QuotesRepo.saveQuote(user.uid, idToken, clone, null);
        showStatus('Cotización duplicada.', false);
        await reloadQuotesData();
      } catch (e) {
        showStatus(e.message || 'Error al duplicar.', true);
      }
    }

    async function deleteClient(clientId) {
      var client = allClients.find(function(c) { return c.id === clientId; });
      var clientName = client ? (client.name || 'este cliente') : 'este cliente';
      var clientQuotes = quotesByClientId[clientId] || [];
      var quoteCount = clientQuotes.length;
      var msg = '¿Eliminar a ' + clientName + ' del directorio?' +
        (quoteCount > 0
          ? ' También se eliminarán sus ' + quoteCount + ' cotización(es) asociada(s).'
          : '') +
        ' Esta acción no se puede deshacer.';
      var ok = window.confirm(msg);
      if (!ok) return;
      try {
        var user = window.FirebaseAuthService.getCurrentUser();
        var idToken = await window.FirebaseAuthService.getValidIdToken();
        // Eliminar cotizaciones asociadas primero
        await Promise.all(clientQuotes.map(function(q) {
          return window.QuotesRepo.deleteQuote(user.uid, idToken, q.id);
        }));
        // Eliminar cliente del directorio
        await window.ClientRepo.deleteClient(user.uid, idToken, clientId);
        // Actualizar estado local
        clientQuotes.forEach(function(q) { delete quoteById[q.id]; });
        allClients = allClients.filter(function(c) { return c.id !== clientId; });
        rebuildQuotesByClient();
        renderFiltered($('clientsSearchInput').value);
        showStatus('Cliente y ' + quoteCount + ' cotización(es) eliminados.', false);
      } catch (e) {
        showStatus(e.message || 'Error al eliminar cliente.', true);
      }
    }

    async function deleteQuote(id) {
      var ok = window.confirm('¿Eliminar esta cotización? Esta acción no se puede deshacer.');
      if (!ok) return;
      try {
        var user = window.FirebaseAuthService.getCurrentUser();
        var idToken = await window.FirebaseAuthService.getValidIdToken();
        await window.QuotesRepo.deleteQuote(user.uid, idToken, id);
        showStatus('Cotización eliminada.', false);
        await reloadQuotesData();
      } catch (e) {
        showStatus(e.message || 'Error al eliminar.', true);
      }
    }

    // ── Modal reprogramar garantía ──────────────────────────
    var _rescheduleId = null;

    function openRescheduleModal(quoteId, currentTs) {
      _rescheduleId = quoteId;
      var modal = $('rescheduleModal');
      var today = new Date().toISOString().slice(0, 10);
      var datePart = $('rescheduleDate');
      var timePart = $('rescheduleTime');
      datePart.min = today;
      datePart.max = '';
      // Precargar fecha actual si existe, si no hoy
      if (currentTs) {
        var d = new Date(currentTs);
        datePart.value = d.toISOString().slice(0, 10);
        timePart.value = d.toTimeString().slice(0, 5);
      } else {
        datePart.value = today;
        timePart.value = '09:00';
      }
      modal.classList.add('open');
      modal.onclick = function(e) { if (e.target === modal) closeRescheduleModal(); };
    }

    function closeRescheduleModal() {
      _rescheduleId = null;
      $('rescheduleModal').classList.remove('open');
    }

// ── Edición de cliente (actualiza todas sus cotizaciones) ────────
    var _editingClient = null;

    function openClientEdit(client) {
      _editingClient = client;
      var setVal = function(id, val) { var el = $(id); if (el) el.value = val || ''; };
      setVal('cpeClientName',    client.name);
      setVal('cpeClientRut',     client.rut);
      setVal('cpeClientPhone',   client.phone);
      setVal('cpeClientEmail',   client.email);
      setVal('cpeClientAddress', client.address);
      setVal('cpeClientCity',    client.city);
      setVal('cpeClientRegion',  client.region);
      setVal('cpeNotes',         client.notes || '');
      var modal = $('clientPartialEditModal');
      modal.classList.add('open');
      modal.onclick = function(e) { if (e.target === modal) closeClientEdit(); };
    }

    function closeClientEdit() {
      _editingClient = null;
      $('clientPartialEditModal').classList.remove('open');
    }

    async function confirmClientEdit() {
      if (!_editingClient) return;
      var getVal = function(id) { var el = $(id); return el ? el.value.trim() : ''; };
      var updatedFields = {
        name:    getVal('cpeClientName'),
        rut:     getVal('cpeClientRut'),
        phone:   getVal('cpeClientPhone'),
        email:   getVal('cpeClientEmail'),
        address: getVal('cpeClientAddress'),
        city:    getVal('cpeClientCity'),
        region:  getVal('cpeClientRegion'),
        notes:   getVal('cpeNotes')
      };
      try {
        var user = window.FirebaseAuthService.getCurrentUser();
        var idToken = await window.FirebaseAuthService.getValidIdToken();

        // 1. Actualizar nodo del cliente en Firebase (usando su id como rutKey)
        if (window.ClientRepo) {
          var clientData = Object.assign({}, _editingClient, updatedFields);
          await window.ClientRepo.saveClientWithId(user.uid, idToken, clientData, _editingClient.id);
        }

        // 2. Actualizar TODAS las cotizaciones asociadas a este cliente
        var clientQuotes = quotesByClientId[_editingClient.id] || [];
        var now = Date.now();
        await Promise.all(clientQuotes.map(async function(q) {
          var merged = Object.assign({}, q, {
            client: Object.assign({}, q.client || {}, updatedFields),
            updatedAt: now
          });
          await window.QuotesRepo.saveQuote(user.uid, idToken, merged, q.id);
          quoteById[q.id] = merged;
        }));

        // 3. Actualizar caché de allClients
        for (var i = 0; i < allClients.length; i++) {
          if (allClients[i].id === _editingClient.id) {
            allClients[i] = Object.assign({}, allClients[i], updatedFields);
            break;
          }
        }

        rebuildQuotesByClient();
        closeClientEdit();
        renderFiltered($('clientsSearchInput').value);
        showStatus('Cliente actualizado en ' + clientQuotes.length + ' cotización(es).', false);
      } catch(e) {
        alert('Error al guardar: ' + (e.message || 'Error desconocido'));
      }
    }

    async function confirmReschedule() {
      if (!_rescheduleId) return;
      var dateVal = $('rescheduleDate').value;
      var timeVal = $('rescheduleTime').value || '09:00';
      if (!dateVal) { alert('Selecciona una fecha.'); return; }
      var ts = new Date(dateVal + 'T' + timeVal).getTime();
      if (isNaN(ts)) { alert('Fecha inválida.'); return; }
      try {
        var user = window.FirebaseAuthService.getCurrentUser();
        var idToken = await window.FirebaseAuthService.getValidIdToken();
        await window.QuotesRepo.updateQuoteStatus(user.uid, idToken, _rescheduleId, 'warranty', { warrantyDate: ts });
        // Actualizar en caché local
        if (quoteById[_rescheduleId]) quoteById[_rescheduleId].warrantyDate = ts;
        rebuildQuotesByClient();
        closeRescheduleModal();
        renderFiltered($('clientsSearchInput').value);
        showStatus('Garantía reprogramada.', false);
      } catch (e) {
        alert('Error al reprogramar: ' + (e.message || 'Error desconocido'));
      }
    }

    function renderClientCard(client, clientQuotes) {
      var count = clientQuotes.length;
      var phoneHtml = client.phone ? '<span class="client-detail-item">' + client.phone + '</span>' : '';
      var emailHtml = client.email ? '<span class="client-detail-item">' + client.email + '</span>' : '';
      var locationHtml = client.city
        ? '<span class="client-detail-item">' + client.city + (client.region ? ', ' + client.region : '') + '</span>'
        : '';

      var quotesHtml = count === 0
        ? '<div class="quote-item" style="font-size:12px;color:#6a655e;text-align:center;padding:14px;">Sin cotizaciones guardadas.</div>'
        : clientQuotes.map(renderQuoteRow).join('');

      var countLabel = count === 1 ? '1 cotización' : (count + ' cotizaciones');
      var phone = client.phone ? client.phone.trim() : '';
      var wazeUrl = buildWazeUrl(client);
      var callBtnCard = phone
        ? '<a class="quotes-btn secondary icon-btn client-action-btn" href="tel:' + phone.replace(/\s/g, '') + '" title="Llamar a ' + (client.name || 'cliente') + '"><i class="fas fa-phone"></i></a>'
        : '';
      var wazeBtnCard = wazeUrl
        ? '<a class="quotes-btn secondary icon-btn client-action-btn" href="' + wazeUrl + '" target="_blank" rel="noopener noreferrer" title="Navegar con Waze"><i class="fas fa-route"></i></a>'
        : '';

      // Alerta de garantía
      var alert = warrantyAlert(clientQuotes);
      var alertCls = alert ? ' client-card-warranty-' + alert : '';
      var alertBadgeMap = {
        expired: '<span class="warranty-badge warranty-badge-expired"><i class="fas fa-shield-halved"></i> Garantía vencida</span>',
        soon:    '<span class="warranty-badge warranty-badge-soon"><i class="fas fa-shield-halved"></i> Garantía próxima</span>',
        active:  '<span class="warranty-badge warranty-badge-active"><i class="fas fa-shield-halved"></i> En garantía</span>'
      };
      var alertBadge = alert ? alertBadgeMap[alert] : '';

      return '<div class="client-card' + alertCls + '" data-client-id="' + client.id + '">' +
        '<div class="client-card-header">' +
          '<div class="client-card-top">' +
            '<div class="client-name-row">' +
              '<div class="client-card-name">' + (client.name || 'Sin nombre') + '</div>' +
              alertBadge +
            '</div>' +
            '<div class="client-card-rut">' + (client.rut || 'Sin RUT') + '</div>' +
            (phoneHtml || emailHtml || locationHtml
              ? '<div class="client-card-details">' + phoneHtml + emailHtml + locationHtml + '</div>'
              : '') +
          '</div>' +
          '<div class="client-card-footer">' +
            '<div class="client-card-actions">' +
              callBtnCard + wazeBtnCard +
              '<button class="quotes-btn secondary icon-btn" data-action="edit-client" data-client-id="' + client.id + '" title="Editar datos del cliente"><i class="fas fa-user-pen"></i></button>' +
              '<button class="quotes-btn danger icon-btn" data-action="delete-client" data-client-id="' + client.id + '" title="Eliminar cliente"><i class="fas fa-user-minus"></i></button>' +
            '</div>' +
            '<button class="client-toggle-btn" data-client-id="' + client.id + '" aria-expanded="false">' +
              '<span class="client-quote-count">' + countLabel + '</span>' +
              '<i class="fas fa-chevron-down client-toggle-icon"></i>' +
            '</button>' +
          '</div>' +
        '</div>' +
        '<div class="client-quotes-list hidden" data-quotes-for="' + client.id + '">' +
          '<div class="quote-list" style="padding:6px;">' + quotesHtml + '</div>' +
        '</div>' +
      '</div>';
    }

    var allClients = [];
    var quoteById = {};
    var quotesByClientId = {};

    // Reconstruye quotesByClientId desde quoteById actualizado
    function rebuildQuotesByClient() {
      quotesByClientId = {};
      allClients.forEach(function(c) {
        var ids = Object.keys(c.quoteIds || {});
        quotesByClientId[c.id] = ids
          .map(function(id) { return quoteById[id]; })
          .filter(Boolean)
          .sort(function(a, b) { return Number(b.updatedAt || 0) - Number(a.updatedAt || 0); });
      });
    }

    function renderFiltered(query) {
      var q = (query || '').trim().toLowerCase();
      var filtered = q
        ? allClients.filter(function(c) {
            return (c.name || '').toLowerCase().indexOf(q) !== -1 ||
                   (c.rut || '').toLowerCase().indexOf(q) !== -1 ||
                   (c.rutKey || '').toLowerCase().indexOf(q) !== -1;
          })
        : allClients;

      var container = $('clientList');
      if (!container) return;

      if (!filtered.length) {
        container.innerHTML = '<div class="quote-item" style="font-size:13px;color:#6a655e;text-align:center;padding:16px;">' +
          (q ? 'Sin resultados para &ldquo;' + q + '&rdquo;.' : 'No hay clientes guardados aún. Los clientes se guardan cuando guardas una cotización con RUT del cliente.') +
          '</div>';
        return;
      }

      container.innerHTML = filtered
        .map(function(c) { return renderClientCard(c, quotesByClientId[c.id] || []); })
        .join('');
    }

    async function bootstrap() {
      if (!window.FirebaseAuthService) {
        window.location.href = 'index.html';
        return;
      }

      var user = window.FirebaseAuthService.getCurrentUser();
      var idToken = await window.FirebaseAuthService.getValidIdToken().catch(function() { return null; });

      if (!user || !idToken) {
        window.location.href = 'index.html';
        return;
      }

      $('sessionInfo').textContent = 'Sesión: ' + (user.email || user.uid);
      showStatus('Cargando clientes...', false);

      try {
        var results = await Promise.all([
          window.ClientRepo.listClients(user.uid, idToken),
          window.QuotesRepo.listQuotes(user.uid, idToken)
        ]);

        var clients = results[0] || [];
        var quotes  = results[1] || [];

        // Build O(1) quote lookup
        quoteById = {};
        quotes.forEach(function(q) { quoteById[q.id] = q; });

        // Group quotes by clientId from the client's quoteIds set
        quotesByClientId = {};
        clients.forEach(function(c) {
          var ids = Object.keys(c.quoteIds || {});
          quotesByClientId[c.id] = ids
            .map(function(id) { return quoteById[id]; })
            .filter(Boolean)
            .sort(function(a, b) { return Number(b.updatedAt || 0) - Number(a.updatedAt || 0); });
        });

        allClients = clients;
        $('clientsListCard').style.display = '';
        showStatus('', false);
        renderFiltered('');

      } catch (e) {
        showStatus('Error al cargar clientes: ' + (e.message || 'Error desconocido.'), true);
      }
    }

    async function onListClick(evt) {
      // "Editar cliente" button (desde card del cliente)
      var editClientBtn = evt.target.closest('button[data-action="edit-client"]');
      if (editClientBtn) {
        var clientId = editClientBtn.dataset.clientId;
        var clientObj = allClients.find(function(c) { return c.id === clientId; });
        if (clientObj) openClientEdit(clientObj);
        return;
      }

      // "Avanzar estado" button
      var advanceBtn = evt.target.closest('button[data-action="advance"]');
      if (advanceBtn) {
        var advId = advanceBtn.dataset.id;
        var next = advanceBtn.dataset.next;
        var needsDate = advanceBtn.dataset.needsDate === '1';
        if (needsDate) {
          var completedAt = advanceBtn.dataset.completedAt ? Number(advanceBtn.dataset.completedAt) : null;
          openScheduleModal(advId, next, completedAt, null);
        } else {
          await advanceStatus(advId, next, null);
        }
        return;
      }

      // "Reprogramar instalación" button
      var rescheduleInstallBtn = evt.target.closest('button[data-action="reschedule-install"]');
      if (rescheduleInstallBtn) {
        var riId = rescheduleInstallBtn.dataset.id;
        var prefillTs = rescheduleInstallBtn.dataset.scheduledDate ? Number(rescheduleInstallBtn.dataset.scheduledDate) : null;
        openScheduleModal(riId, 'scheduled', null, prefillTs);
        return;
      }

      // "Reprogramar garantía" button
      var rescheduleWarrantyBtn = evt.target.closest('button[data-action="reschedule-warranty"]');
      if (rescheduleWarrantyBtn) {
        var rwId = rescheduleWarrantyBtn.dataset.id;
        var rwPrefill = rescheduleWarrantyBtn.dataset.warrantyDate ? Number(rescheduleWarrantyBtn.dataset.warrantyDate) : null;
        var rwQuote = quoteById[rwId];
        var rwCompletedAt = rwQuote ? rwQuote.completedAt : null;
        openScheduleModal(rwId, 'warranty', rwCompletedAt, rwPrefill);
        return;
      }

      // "Duplicar" button
      var duplicateBtn = evt.target.closest('button[data-action="duplicate"]');
      if (duplicateBtn) {
        await duplicateQuote(duplicateBtn.dataset.id);
        return;
      }

      // "Eliminar cliente" button
      var deleteClientBtn = evt.target.closest('button[data-action="delete-client"]');
      if (deleteClientBtn) {
        await deleteClient(deleteClientBtn.dataset.clientId);
        return;
      }

      // "Eliminar" button
      var deleteBtn = evt.target.closest('button[data-action="delete"]');
      if (deleteBtn) {
        await deleteQuote(deleteBtn.dataset.id);
        return;
      }

      // "Ver detalle" button
      var detailBtn = evt.target.closest('button[data-action="detail"]');
      if (detailBtn) {
        var detailId = detailBtn.dataset.id;
        var detailQuote = quoteById[detailId];
        if (detailQuote) openDetailModal(detailQuote);
        return;
      }

      // "Abrir y editar" button
      var openBtn = evt.target.closest('button[data-action="open"]');
      if (openBtn) {
        var openId = openBtn.dataset.id;
        var openQuote = quoteById[openId];
        if (openQuote) {
          navigateToEditorWithQuote(openQuote);
        } else {
          showStatus('No se encontró la cotización.', true);
        }
        return;
      }

      // Toggle client accordion
      var toggleBtn = evt.target.closest('button.client-toggle-btn');
      if (toggleBtn) {
        var toggleClientId = toggleBtn.dataset.clientId;
        var panel = document.querySelector('[data-quotes-for="' + toggleClientId + '"]');
        if (panel) {
          var isOpen = !panel.classList.contains('hidden');
          panel.classList.toggle('hidden', isOpen);
          toggleBtn.setAttribute('aria-expanded', String(!isOpen));
        }
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      $('btnBackApp').addEventListener('click', function() {
        window.location.href = 'index.html';
      });

      $('btnLogout').addEventListener('click', function() {
        if (window.FirebaseAuthService) window.FirebaseAuthService.signOut();
        window.location.href = 'index.html';
      });

      $('clientsSearchInput').addEventListener('input', function() {
        renderFiltered(this.value);
      });

      $('clientsListCard').addEventListener('click', onListClick);
      $('btnClientsScheduleConfirm').addEventListener('click', confirmSchedule);
      $('btnClientsScheduleCancel').addEventListener('click', closeScheduleModal);
      $('clientsScheduleModal').addEventListener('click', function(e) { if (e.target === $('clientsScheduleModal')) closeScheduleModal(); });

      bootstrap();
    });

    window.confirmReschedule        = confirmReschedule;
    window.closeRescheduleModal      = closeRescheduleModal;
    window.confirmClientEdit         = confirmClientEdit;
    window.closeClientEdit           = closeClientEdit;
  })();
  </script>
  <!-- MODAL: EDITAR CLIENTE / NOTAS -->
  <div class="detail-overlay" id="clientPartialEditModal">
    <div class="detail-sheet">
      <div class="detail-handle"></div>
      <div class="schedule-title">Editar datos del cliente</div>
      <p class="schedule-hint">Solo puedes editar información del cliente y observaciones.</p>
      <div class="partial-edit-fields">
        <div class="partial-edit-group">
          <label class="schedule-label">Nombre</label>
          <input type="text" id="cpeClientName" class="schedule-input" placeholder="Nombre del cliente">
        </div>
        <div class="partial-edit-group">
          <label class="schedule-label">RUT</label>
          <input type="text" id="cpeClientRut" class="schedule-input" placeholder="12.345.678-9">
        </div>
        <div class="partial-edit-group">
          <label class="schedule-label">Teléfono</label>
          <input type="tel" id="cpeClientPhone" class="schedule-input" placeholder="+56 9 XXXX XXXX">
        </div>
        <div class="partial-edit-group">
          <label class="schedule-label">Correo</label>
          <input type="email" id="cpeClientEmail" class="schedule-input" placeholder="correo@ejemplo.cl">
        </div>
        <div class="partial-edit-group partial-edit-full">
          <label class="schedule-label">Dirección</label>
          <input type="text" id="cpeClientAddress" class="schedule-input" placeholder="Dirección">
        </div>
        <div class="partial-edit-group">
          <label class="schedule-label">Ciudad</label>
          <input type="text" id="cpeClientCity" class="schedule-input" placeholder="Ciudad">
        </div>
        <div class="partial-edit-group">
          <label class="schedule-label">Región</label>
          <input type="text" id="cpeClientRegion" class="schedule-input" placeholder="Región">
        </div>
        <div class="partial-edit-group partial-edit-full">
          <label class="schedule-label">Observaciones generales</label>
          <textarea id="cpeNotes" class="schedule-input" rows="3" placeholder="Observaciones..."></textarea>
        </div>
      </div>
      <div class="schedule-actions">
        <button class="quotes-btn schedule-confirm-btn" onclick="confirmClientEdit()"><i class="fas fa-floppy-disk"></i> Guardar</button>
        <button class="quotes-btn secondary" onclick="closeClientEdit()">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: REPROGRAMAR GARANTÍA -->
  <div class="detail-overlay" id="rescheduleModal">
    <div class="detail-sheet" style="max-height:60vh">
      <div class="detail-handle"></div>
      <div class="schedule-title">Reprogramar visita de garantía</div>
      <p class="schedule-hint">Selecciona la nueva fecha y hora de la visita.</p>
      <div class="schedule-fields">
        <div class="schedule-field-group">
          <label class="schedule-label"><i class="fas fa-calendar"></i> Fecha</label>
          <input type="date" id="rescheduleDate" class="schedule-input">
        </div>
        <div class="schedule-field-group">
          <label class="schedule-label"><i class="fas fa-clock"></i> Hora</label>
          <input type="time" id="rescheduleTime" class="schedule-input" value="09:00">
        </div>
      </div>
      <div class="schedule-actions">
        <button class="quotes-btn schedule-confirm-btn" onclick="confirmReschedule()"><i class="fas fa-calendar-check"></i> Confirmar</button>
        <button class="quotes-btn secondary" onclick="closeRescheduleModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: DETALLE COTIZACIÓN -->
  <div class="detail-overlay" id="clientDetailModal"></div>

  <!-- MODAL: PROGRAMAR FECHA -->
  <div class="schedule-overlay" id="clientsScheduleModal">
    <div class="schedule-sheet">
      <div class="schedule-handle"></div>
      <div class="schedule-title" id="clientsScheduleTitle">Programar fecha</div>
      <p class="schedule-hint" id="clientsScheduleHint"></p>
      <div class="schedule-fields">
        <div class="schedule-field-group">
          <label class="schedule-label"><i class="fas fa-calendar"></i> Fecha</label>
          <input type="date" id="clientsScheduleDatePart" class="schedule-input">
        </div>
        <div class="schedule-field-group">
          <label class="schedule-label"><i class="fas fa-clock"></i> Hora</label>
          <input type="time" id="clientsScheduleTimePart" class="schedule-input" value="09:00">
        </div>
      </div>
      <div class="schedule-actions">
        <button class="quotes-btn schedule-confirm-btn" id="btnClientsScheduleConfirm"><i class="fas fa-calendar-check"></i> Confirmar</button>
        <button class="quotes-btn secondary" id="btnClientsScheduleCancel">Cancelar</button>
      </div>
    </div>
  </div>

</body>
